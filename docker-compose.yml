version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: verifier-bot-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-verifier}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-verifier_bot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-verifier} -d ${DB_NAME:-verifier_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - verifier-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verifier-bot-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgres://${DB_USER:-verifier}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-verifier_bot}
      DEFAULT_MODERATOR_CHAT_ID: ${DEFAULT_MODERATOR_CHAT_ID}
      ALLOWED_MODERATOR_IDS: ${ALLOWED_MODERATOR_IDS}
      CONFIG_PATH: ${CONFIG_PATH:-config.toml}
      USE_WEBHOOKS: ${USE_WEBHOOKS:-false}
      PUBLIC_WEBHOOK_URL: ${PUBLIC_WEBHOOK_URL}
      SERVER_PORT: ${SERVER_PORT:-8080}
      RUST_LOG: ${RUST_LOG:-verifier_bot=info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SQLX_OFFLINE: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - verifier-network

volumes:
  pgdata:
    driver: local

networks:
  verifier-network:
    driver: bridge
